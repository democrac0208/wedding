<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청모 기록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#f8f5f0; --surface:#fff; --surface2:#f2ede6;
  --border:#e8e0d4; --text:#2c2420; --muted:#9a8e84;
  --accent:#8b6f5e; --accent2:#c4a882; --accent-light:#f0e8de;
  --red:#c0392b; --green:#2d7a4a;
  --mj:#6b9fd4; --mj-bg:rgba(107,159,212,0.08); --mj-border:rgba(107,159,212,0.3);
  --es:#d47b9f; --es-bg:rgba(212,123,159,0.08); --es-border:rgba(212,123,159,0.3);
}
body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:14px; }

.header { background:var(--text); padding:24px 24px 18px; text-align:center; }
.header-sub { font-size:10px; color:var(--accent2); letter-spacing:4px; text-transform:uppercase; margin-bottom:6px; }
.header h1 { font-family:'Noto Serif KR',serif; font-size:24px; font-weight:300; color:#f8f5f0; letter-spacing:3px; }
.sync-status { font-size:10px; margin-top:7px; letter-spacing:1px; }

.nav { display:flex; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.nav-btn { flex:1; padding:12px 4px; background:none; border:none; color:var(--muted); font-family:'Noto Sans KR',sans-serif; font-size:11px; cursor:pointer; letter-spacing:.5px; border-bottom:2px solid transparent; transition:all .2s; }
.nav-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

.container { max-width:800px; margin:0 auto; padding:20px 16px 80px; }
.section { display:none; } .section.active { display:block; }

/* WHO TOGGLE */
.who-toggle { display:flex; gap:0; background:var(--surface); border:1px solid var(--border); border-radius:3px; overflow:hidden; margin-bottom:16px; }
.who-btn { flex:1; padding:11px; border:none; background:none; font-family:'Noto Sans KR',sans-serif; font-size:13px; cursor:pointer; transition:all .2s; color:var(--muted); }
.who-btn.mj { border-right:1px solid var(--border); }
.who-btn.active-mj { background:var(--mj-bg); color:var(--mj); font-weight:500; border-bottom:2px solid var(--mj); }
.who-btn.active-es { background:var(--es-bg); color:var(--es); font-weight:500; border-bottom:2px solid var(--es); }
.who-btn.active-all { background:var(--accent-light); color:var(--accent); font-weight:500; }

/* CARDS */
.grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:12px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:3px; padding:14px 16px; }
.card-label { font-size:10px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:5px; }
.card-value { font-family:'Noto Serif KR',serif; font-size:20px; color:var(--text); line-height:1; }
.card-sub { font-size:11px; color:var(--muted); margin-top:3px; }
.card-value.accent { color:var(--accent); }

/* PERSON CARDS */
.person-summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.person-summary-card { border-radius:3px; padding:14px 16px; }
.person-summary-card.mj { background:var(--mj-bg); border:1px solid var(--mj-border); }
.person-summary-card.es { background:var(--es-bg); border:1px solid var(--es-border); }
.ps-name { font-size:12px; font-weight:500; margin-bottom:6px; }
.person-summary-card.mj .ps-name { color:var(--mj); }
.person-summary-card.es .ps-name { color:var(--es); }
.ps-val { font-family:'Noto Serif KR',serif; font-size:20px; }
.ps-sub { font-size:11px; color:var(--muted); margin-top:3px; }

/* TOTALS BAR */
.totals-bar { background:var(--text); border-radius:3px; padding:12px 18px; margin-bottom:14px; display:flex; gap:20px; flex-wrap:wrap; }
.tb-item .lbl { font-size:10px; color:var(--accent2); letter-spacing:1px; text-transform:uppercase; margin-bottom:2px; }
.tb-item .val { font-family:'Noto Serif KR',serif; font-size:17px; color:#f8f5f0; }

/* FILTER */
.toolbar { display:flex; gap:7px; margin-bottom:14px; flex-wrap:wrap; }
.filter-btn { background:var(--surface); border:1px solid var(--border); color:var(--muted); font-family:'Noto Sans KR',sans-serif; font-size:11px; padding:5px 12px; border-radius:20px; cursor:pointer; transition:all .2s; }
.filter-btn.active { background:var(--accent); border-color:var(--accent); color:white; }

/* MEETING CARDS */
.meeting-card { background:var(--surface); border:1px solid var(--border); border-radius:3px; margin-bottom:10px; overflow:hidden; cursor:pointer; transition:box-shadow .15s; border-left:3px solid var(--border); }
.meeting-card:hover { box-shadow:0 2px 8px rgba(0,0,0,.08); }
.meeting-card.mj { border-left-color:var(--mj); }
.meeting-card.es { border-left-color:var(--es); }
.meeting-header { padding:13px 16px; display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
.meeting-left { flex:1; min-width:0; }
.meeting-date { font-size:11px; color:var(--muted); margin-bottom:2px; }
.meeting-people-text { font-size:12px; color:var(--muted); }
.meeting-right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
.meeting-total { font-family:'Noto Serif KR',serif; font-size:16px; color:var(--accent); }
.meeting-avg { font-size:11px; color:var(--muted); }
.yn-o { display:inline-block; background:#e8f5ec; color:var(--green); font-size:10px; font-weight:500; padding:2px 8px; border-radius:10px; }
.yn-x { display:inline-block; background:#f5e8e8; color:var(--red); font-size:10px; font-weight:500; padding:2px 8px; border-radius:10px; }
.badge-done { display:inline-block; background:#e8f0f5; color:#4a6b8a; font-size:10px; padding:2px 8px; border-radius:10px; }
.badge-upcoming { display:inline-block; background:var(--surface2); color:var(--muted); font-size:10px; padding:2px 8px; border-radius:10px; }
.who-badge-mj { display:inline-block; background:var(--mj-bg); color:var(--mj); font-size:10px; font-weight:500; padding:2px 8px; border-radius:10px; }
.who-badge-es { display:inline-block; background:var(--es-bg); color:var(--es); font-size:10px; font-weight:500; padding:2px 8px; border-radius:10px; }
.btn-del-sm { background:none; border:1px solid var(--border); color:var(--muted); font-size:11px; padding:3px 8px; border-radius:2px; cursor:pointer; }
.btn-del-sm:hover { border-color:var(--red); color:var(--red); }
.btn-edit-sm { background:none; border:1px solid var(--border); color:var(--muted); font-size:11px; padding:3px 8px; border-radius:2px; cursor:pointer; }
.btn-edit-sm:hover { border-color:var(--accent); color:var(--accent); }

.payment-list { border-top:1px solid var(--border); }
.payment-row { display:flex; justify-content:space-between; align-items:center; padding:8px 16px; border-bottom:1px dashed var(--border); font-size:13px; background:var(--bg); }
.payment-row:last-child { border-bottom:none; }
.payment-place { flex:1; }
.payment-memo { font-size:11px; color:var(--muted); margin-left:6px; }
.payment-amt { font-family:'Noto Serif KR',serif; font-size:14px; color:var(--accent); white-space:nowrap; margin-left:12px; }

/* PEOPLE TAB */
.section-title { font-size:10px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px; }
.people-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin-bottom:16px; }
.person-card { background:var(--surface); border:1px solid var(--border); border-radius:3px; padding:12px 14px; cursor:pointer; transition:all .15s; position:relative; }
.person-card:hover { border-color:var(--accent); }
.person-name-big { font-size:14px; font-weight:500; margin-bottom:2px; }
.person-group { font-size:11px; color:var(--muted); margin-bottom:7px; }
.person-stats { display:flex; gap:10px; }
.person-stat { font-size:11px; color:var(--muted); }
.person-stat strong { font-family:'Noto Serif KR',serif; font-size:13px; color:var(--accent); display:block; }
.person-del-btn { position:absolute; top:7px; right:7px; background:none; border:none; color:var(--muted); font-size:14px; cursor:pointer; opacity:0; }
.person-card:hover .person-del-btn { opacity:1; }
.person-del-btn:hover { color:var(--red); }

.add-person-form { background:var(--surface); border:1px solid var(--border); border-radius:3px; padding:14px; margin-bottom:14px; display:flex; gap:8px; flex-wrap:wrap; }
.add-person-form input { flex:1; min-width:90px; background:var(--bg); border:1px solid var(--border); border-radius:2px; padding:8px 11px; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:13px; outline:none; }
.add-person-form input:focus { border-color:var(--accent); }
.btn-add-person { background:var(--text); border:none; color:#f8f5f0; font-family:'Noto Sans KR',sans-serif; font-size:12px; padding:8px 14px; border-radius:2px; cursor:pointer; white-space:nowrap; }
.btn-add-person:hover { background:var(--accent); }

.person-detail-header { background:var(--surface); border:1px solid var(--border); border-radius:3px; padding:14px 16px; margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; }
.btn-back { background:none; border:1px solid var(--border); color:var(--muted); font-family:'Noto Sans KR',sans-serif; font-size:12px; padding:6px 14px; border-radius:2px; cursor:pointer; }

/* CALENDAR */
.cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.cal-month-label { font-family:'Noto Serif KR',serif; font-size:18px; font-weight:300; }
.cal-arrow { background:none; border:1px solid var(--border); border-radius:2px; width:34px; height:34px; font-size:18px; color:var(--muted); cursor:pointer; }
.cal-arrow:hover { border-color:var(--accent); color:var(--accent); }
.cal-grid { background:var(--surface); border:1px solid var(--border); border-radius:3px; overflow:hidden; }
.cal-dow { display:grid; grid-template-columns:repeat(7,1fr); background:var(--text); }
.cal-dow span { text-align:center; padding:8px 0; font-size:10px; color:var(--accent2); letter-spacing:1px; }
.cal-days { display:grid; grid-template-columns:repeat(7,1fr); }
.cal-day { min-height:56px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); padding:5px 6px; }
.cal-day:nth-child(7n) { border-right:none; }
.cal-day.other-month { background:var(--bg); }
.cal-day.today { background:var(--accent-light); }
.cal-day-num { font-size:11px; color:var(--muted); margin-bottom:3px; }
.cal-day.today .cal-day-num { color:var(--accent); font-weight:500; }
.cal-dot { font-size:10px; border-radius:3px; padding:1px 5px; margin-bottom:2px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; display:block; color:white; }
.cal-dot.mj { background:var(--mj); }
.cal-dot.es { background:var(--es); }
.cal-dot:hover { opacity:.8; }

/* FORM */
.form-card { background:var(--surface); border:1px solid var(--border); border-radius:3px; padding:22px; }
.form-title { font-family:'Noto Serif KR',serif; font-size:18px; font-weight:300; margin-bottom:20px; padding-bottom:12px; border-bottom:1px solid var(--border); }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-field { display:flex; flex-direction:column; gap:5px; margin-bottom:12px; }
.form-field label { font-size:10px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; }
.form-field input { background:var(--bg); border:1px solid var(--border); border-radius:2px; padding:9px 12px; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:13px; outline:none; width:100%; }
.form-field input:focus { border-color:var(--accent); }

.who-select { display:flex; gap:8px; }
.who-select-btn { flex:1; padding:9px; border:1px solid var(--border); border-radius:2px; background:var(--bg); font-family:'Noto Sans KR',sans-serif; font-size:13px; cursor:pointer; text-align:center; transition:all .2s; }
.who-select-btn.active-mj { background:var(--mj-bg); border-color:var(--mj); color:var(--mj); font-weight:500; }
.who-select-btn.active-es { background:var(--es-bg); border-color:var(--es); color:var(--es); font-weight:500; }

.yn-toggle { display:flex; gap:8px; }
.yn-btn { flex:1; padding:9px; border:1px solid var(--border); border-radius:2px; background:var(--bg); font-family:'Noto Sans KR',sans-serif; font-size:13px; cursor:pointer; text-align:center; transition:all .2s; }
.yn-btn.active-o { background:#e8f5ec; border-color:var(--green); color:var(--green); font-weight:500; }
.yn-btn.active-x { background:#f5e8e8; border-color:var(--red); color:var(--red); font-weight:500; }

/* PEOPLE SEARCH */
.people-search-wrap { position:relative; background:var(--bg); border:1px solid var(--border); border-radius:2px; padding:10px 12px; }
.people-search-input { width:100%; border:none; background:transparent; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:13px; outline:none; }
.people-search-input::placeholder { color:var(--muted); }
.search-dropdown { display:none; position:absolute; left:0; right:0; top:100%; background:var(--surface); border:1px solid var(--border); border-top:none; border-radius:0 0 3px 3px; z-index:50; max-height:200px; overflow-y:auto; box-shadow:0 4px 12px rgba(0,0,0,.1); }
.search-dropdown.open { display:block; }
.search-item { padding:9px 14px; font-size:13px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
.search-item:hover { background:var(--accent-light); }
.search-item-group { font-size:11px; color:var(--muted); }
.selected-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
.selected-tag { display:flex; align-items:center; gap:4px; background:var(--accent-light); border:1px solid var(--accent); color:var(--accent); font-size:12px; padding:3px 10px; border-radius:20px; }
.selected-tag button { background:none; border:none; color:var(--accent); font-size:14px; cursor:pointer; padding:0; line-height:1; margin-left:2px; }
.selected-tag button:hover { color:var(--red); }
.search-no-result { padding:9px 14px; font-size:12px; color:var(--muted); }

.pay-items { display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
.pay-item-row { display:grid; grid-template-columns:1fr 110px 90px auto; gap:8px; align-items:center; }
.pay-item-row input { background:var(--bg); border:1px solid var(--border); border-radius:2px; padding:8px 10px; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:12px; outline:none; width:100%; }
.pay-item-row input:focus { border-color:var(--accent); }
.btn-add-pay { background:none; border:1px dashed var(--border); color:var(--muted); padding:7px 14px; border-radius:2px; cursor:pointer; font-size:11px; font-family:'Noto Sans KR',sans-serif; transition:all .2s; width:100%; margin-bottom:12px; }
.btn-add-pay:hover { border-color:var(--accent); color:var(--accent); }
.btn-del-row { background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer; padding:2px 6px; }
.btn-del-row:hover { color:var(--red); }
.btn-submit { width:100%; background:var(--text); border:none; color:#f8f5f0; font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:500; padding:13px; border-radius:2px; cursor:pointer; letter-spacing:2px; margin-top:4px; }
.btn-submit:hover { background:var(--accent); }

/* MODAL */
.modal-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; align-items:center; justify-content:center; padding:16px; }
.modal-backdrop.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:3px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; padding:22px; }
.modal-title { font-family:'Noto Serif KR',serif; font-size:18px; font-weight:300; margin-bottom:18px; padding-bottom:12px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.modal-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; }
.modal-actions { display:flex; gap:10px; margin-top:14px; }
.btn-save { flex:1; background:var(--text); border:none; color:#f8f5f0; font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:500; padding:11px; border-radius:2px; cursor:pointer; }
.btn-save:hover { background:var(--accent); }
.btn-cancel { flex:0 0 auto; background:none; border:1px solid var(--border); color:var(--muted); font-family:'Noto Sans KR',sans-serif; font-size:13px; padding:11px 16px; border-radius:2px; cursor:pointer; }

.empty { padding:50px 20px; text-align:center; color:var(--muted); font-size:13px; }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(60px); background:var(--text); color:#f8f5f0; padding:10px 22px; border-radius:2px; font-size:13px; transition:transform .3s; z-index:999; pointer-events:none; }
.toast.show { transform:translateX(-50%) translateY(0); }

@media(max-width:600px) {
  .grid3 { grid-template-columns:1fr 1fr; }
  .form-grid { grid-template-columns:1fr; }
  .pay-item-row { grid-template-columns:1fr 100px auto; }
  .pay-item-row input:nth-child(3) { display:none; }
  .people-grid { grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-sub">Wedding · 2026.06.27</div>
  <h1>청 모 기 록</h1>
  <div class="sync-status" id="syncStatus" style="color:#888">○ 연결 중…</div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showTab('summary',this)">요약</button>
  <button class="nav-btn" onclick="showTab('list',this)">모임 목록</button>
  <button class="nav-btn" onclick="showTab('calendar',this)">캘린더</button>
  <button class="nav-btn" onclick="showTab('people',this)">인원</button>
  <button class="nav-btn" onclick="showTab('add',this)">+ 추가</button>
</nav>

<div class="container">

  <!-- SUMMARY -->
  <div class="section active" id="tab-summary">
    <div class="who-toggle">
      <button class="who-btn mj active-all" id="sum-all" onclick="setSumFilter('all')">전체</button>
      <button class="who-btn mj" id="sum-mj" onclick="setSumFilter('mj')">👨 민주</button>
      <button class="who-btn" id="sum-es" onclick="setSumFilter('es')">👩 은선</button>
    </div>
    <div class="grid3">
      <div class="card"><div class="card-label">총 지출</div><div class="card-value accent" id="s-total">—</div><div class="card-sub">원</div></div>
      <div class="card"><div class="card-label">모임 횟수</div><div class="card-value" id="s-count">—</div><div class="card-sub">회</div></div>
      <div class="card"><div class="card-label">양쪽 참석</div><div class="card-value" id="s-attend">—</div><div class="card-sub">회</div></div>
    </div>
    <div class="person-summary-grid">
      <div class="person-summary-card mj">
        <div class="ps-name">👨 민주 모임</div>
        <div class="ps-val" id="s-mj-count">—</div>
        <div class="ps-sub" id="s-mj-amt">—원</div>
      </div>
      <div class="person-summary-card es">
        <div class="ps-name">👩 은선 모임</div>
        <div class="ps-val" id="s-es-count">—</div>
        <div class="ps-sub" id="s-es-amt">—원</div>
      </div>
    </div>
    <div class="section-title">최근 모임</div>
    <div id="recentList"></div>
  </div>

  <!-- LIST -->
  <div class="section" id="tab-list">
    <div class="totals-bar">
      <div class="tb-item"><div class="lbl">총 지출</div><div class="val" id="lt-total">—</div></div>
      <div class="tb-item"><div class="lbl">모임 수</div><div class="val" id="lt-count">—</div></div>
      <div class="tb-item"><div class="lbl">양쪽 참석</div><div class="val" id="lt-attend">—</div></div>
    </div>
    <div class="toolbar">
      <button class="filter-btn active" onclick="setListFilter('all',this)">전체</button>
      <button class="filter-btn" onclick="setListFilter('mj',this)">👨 민주</button>
      <button class="filter-btn" onclick="setListFilter('es',this)">👩 은선</button>
      <button class="filter-btn" onclick="setListFilter('O',this)">양쪽 참석</button>
      <button class="filter-btn" onclick="setListFilter('X',this)">양쪽 미참석</button>
    </div>
    <div id="meetingList"></div>
    <div class="empty" id="listEmpty" style="display:none">해당하는 내역이 없습니다</div>
  </div>

  <!-- CALENDAR -->
  <div class="section" id="tab-calendar">
    <div class="cal-nav">
      <button class="cal-arrow" onclick="calPrev()">‹</button>
      <div class="cal-month-label" id="calMonthLabel"></div>
      <button class="cal-arrow" onclick="calNext()">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div id="calDetail" style="display:none;margin-top:14px"></div>
  </div>

  <!-- PEOPLE -->
  <div class="section" id="tab-people">

// ── PEOPLE SEARCH SELECTION ──
const selectedFbKeys = { f: [], m: [] };

function searchPeople(prefix) {
  const q = document.getElementById(prefix+'-search').value.trim().toLowerCase();
  const dd = document.getElementById(prefix+'-dropdown');
  if (!q) { dd.classList.remove('open'); return; }
  const results = people.filter(p =>
    p.name.toLowerCase().includes(q) && !selectedFbKeys[prefix].includes(p.fbKey)
  ).slice(0, 10);
  if (!results.length) {
    dd.innerHTML = `<div class="search-no-result">검색 결과 없음 — 엔터로 직접 추가</div>`;
  } else {
    dd.innerHTML = results.map(p =>
      `<div class="search-item" onclick="selectPerson('${prefix}','${p.fbKey}')">
        <span>${p.name}</span><span class="search-item-group">${p.group}</span>
      </div>`
    ).join('');
  }
  dd.classList.add('open');
}
window.searchPeople = searchPeople;

function selectPerson(prefix, fbKey) {
  if (selectedFbKeys[prefix].includes(fbKey)) return;
  selectedFbKeys[prefix].push(fbKey);
  document.getElementById(prefix+'-search').value = '';
  document.getElementById(prefix+'-dropdown').classList.remove('open');
  renderSelectedTags(prefix);
}
window.selectPerson = selectPerson;

function removeSelected(prefix, fbKey) {
  selectedFbKeys[prefix] = selectedFbKeys[prefix].filter(k => k !== fbKey);
  renderSelectedTags(prefix);
}

function renderSelectedTags(prefix) {
  const wrap = document.getElementById(prefix+'-tags');
  wrap.innerHTML = selectedFbKeys[prefix].map(fbKey => {
    const p = people.find(x => x.fbKey === fbKey);
    return `<span class="selected-tag">${p?.name||'?'}<button onclick="removeSelected('${prefix}','${fbKey}')">×</button></span>`;
  }).join('');
}

function resetSearch(prefix) {
  selectedFbKeys[prefix] = [];
  document.getElementById(prefix+'-search').value = '';
  document.getElementById(prefix+'-dropdown').classList.remove('open');

function addPayItem(containerId, prefix, place='', amount='', memo='') {
  const id=++payCounter;

  div.innerHTML=`
    <input type="text" placeholder="장소" id="${prefix}-place-${id}" value="${place}">

    <input type="text" placeholder="비고" id="${prefix}-memo-${id}" value="${memo}">
    <button class="btn-del-row" onclick="document.getElementById('${prefix}-row-${id}').remove()">×</button>`;
  document.getElementById(containerId).appendChild(div);
}
window.addPayItem = addPayItem;
function getPayItems(containerId, prefix) {
  const items=[];
  document.getElementById(containerId).querySelectorAll('.pay-item-row').forEach(row=>{
    const id=row.id.replace(prefix+'-row-','');
    const place=document.getElementById(prefix+'-place-'+id)?.value.trim()||'';
    const amount=parseFloat(document.getElementById(prefix+'-amt-'+id)?.value)||0;
    const memo=document.getElementById(prefix+'-memo-'+id)?.value.trim()||'';
    if (place||amount) items.push({place,amount,memo});
  });
  return items;
}

// ── MEETING CARD ──
function renderMeetingCard(m, isRecent=false) {
  const total=totalAmt(m);
  const names=(m.personFbKeys||[]).map(k=>getPersonName(k));
  const extras=m.extraPeople?m.extraPeople.split(/[,，]/).map(s=>s.trim()).filter(Boolean):[];
  const allNames=[...names,...extras];
  const extraCount = m.yn==='O' ? 2 : 1;
  const avg=(total&&allNames.length)?Math.round(total/(allNames.length+extraCount)):0;
  const today=new Date(); today.setHours(0,0,0,0);
  const mDate=m.date?new Date(m.date):null;
  const doneBadge=mDate
    ?(mDate<today?'<span class="badge-done">진행</span>':'<span class="badge-upcoming">미진행</span>')
    :'<span class="badge-upcoming">미진행</span>';
  const whoBadge=m.who==='mj'?'<span class="who-badge-mj">👨 민주</span>':'<span class="who-badge-es">👩 은선</span>';
  const ynBadge=m.yn==='O'?'<span class="yn-o">참석</span>':'<span class="yn-x">미참석</span>';
  const payHtml=(m.payments||[]).filter(p=>p.place||p.amount).map(p=>`
    <div class="payment-row">
      <span class="payment-place">${p.place||'—'}</span>
      ${p.memo?`<span class="payment-memo">${p.memo}</span>`:''}
      <span class="payment-amt">${p.amount?p.amount.toLocaleString()+'원':'—'}</span>
    </div>`).join('');
  return `<div class="meeting-card ${m.who||''}" onclick="if(!event.target.closest('button'))window.openEdit('${m.fbKey}')">
    <div class="meeting-header">
      <div class="meeting-left">
        <div class="meeting-date">${fmtDate(m.date)}</div>
        <div class="meeting-people-text">${allNames.join(', ')||'참석자 없음'}</div>
      </div>
      <div class="meeting-right">
        <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
          ${whoBadge}${doneBadge}${ynBadge}
          ${!isRecent?`<button class="btn-edit-sm" onclick="event.stopPropagation();window.openEdit('${m.fbKey}')">수정</button><button class="btn-del-sm" onclick="event.stopPropagation();window.delMeeting('${m.fbKey}')">삭제</button>`:''}
        </div>
        ${total?`<div class="meeting-total">${total.toLocaleString()}원${avg?`<span class="meeting-avg"> · 인당 ~${avg.toLocaleString()}</span>`:''}</div>`:''}
      </div>
    </div>
    ${payHtml?`<div class="payment-list">${payHtml}</div>`:''}
  </div>`;
}

  document.getElementById('s-count').textContent=f.length;
  document.getElementById('s-attend').textContent=attendO;
  const mj=meetings.filter(m=>m.who==='mj');
  const es=meetings.filter(m=>m.who==='es');
  document.getElementById('s-mj-count').textContent=mj.length+'회';
  document.getElementById('s-mj-amt').textContent=mj.reduce((s,m)=>s+totalAmt(m),0).toLocaleString()+'원';
  document.getElementById('s-es-count').textContent=es.length+'회';
  document.getElementById('s-es-amt').textContent=es.reduce((s,m)=>s+totalAmt(m),0).toLocaleString()+'원';
  const sorted=[...f].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  document.getElementById('recentList').innerHTML=sorted.map(m=>renderMeetingCard(m,true)).join('')||'<div class="empty">모임이 없습니다</div>';
}

// ── LIST ──
function setListFilter(f,btn) {
  curListFilter=f;
  document.querySelectorAll('.toolbar .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}
window.setListFilter = setListFilter;
function renderList() {
  let f=meetings;
  if (curListFilter==='mj') f=meetings.filter(m=>m.who==='mj');
  else if (curListFilter==='es') f=meetings.filter(m=>m.who==='es');
  else if (curListFilter==='O') f=meetings.filter(m=>m.yn==='O');
  else if (curListFilter==='X') f=meetings.filter(m=>m.yn==='X');
  const total=f.reduce((s,m)=>s+totalAmt(m),0);
  document.getElementById('lt-total').textContent=total.toLocaleString()+' 원';
  document.getElementById('lt-count').textContent=f.length+' 회';
  document.getElementById('lt-attend').textContent=f.filter(m=>m.yn==='O').length+' 회';
  const sorted=[...f].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const em=document.getElementById('listEmpty'), list=document.getElementById('meetingList');
  if (!sorted.length) { list.innerHTML=''; em.style.display='block'; return; }
  em.style.display='none';
  list.innerHTML=sorted.map(m=>renderMeetingCard(m)).join('');
}

// ── CALENDAR ──
function calPrev() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function calNext() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }
window.calPrev=calPrev; window.calNext=calNext;

function renderCalendar() {
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonthLabel').textContent=`${calYear}년 ${months[calMonth]}`;
  const today=new Date(); today.setHours(0,0,0,0);
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  const mMap={};
  meetings.forEach(m=>{
    if (!m.date) return;
    const d=new Date(m.date);
    if (d.getFullYear()===calYear&&d.getMonth()===calMonth) {
      const k=d.getDate(); (mMap[k]=mMap[k]||[]).push(m);
    }
  });
  let html=`<div class="cal-dow"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div><div class="cal-days">`;
  for (let i=firstDay-1;i>=0;i--) html+=`<div class="cal-day other-month"><div class="cal-day-num" style="color:var(--muted2)">${daysInPrev-i}</div></div>`;
  for (let d=1;d<=daysInMonth;d++) {
    const isToday=(new Date(calYear,calMonth,d).getTime()===today.getTime());
    const ms=mMap[d]||[];
    const dots=ms.map(m=>`<span class="cal-dot ${m.who||'mj'}" onclick="event.stopPropagation();showCalDetail('${m.fbKey}')">${m.who==='mj'?'민주':'은선'}</span>`).join('');
    html+=`<div class="cal-day${isToday?' today':''}"><div class="cal-day-num">${d}</div>${dots}</div>`;
  }
  const rem=(firstDay+daysInMonth)%7===0?0:7-(firstDay+daysInMonth)%7;
  for (let d=1;d<=rem;d++) html+=`<div class="cal-day other-month"><div class="cal-day-num" style="color:var(--muted2)">${d}</div></div>`;
  html+='</div>';
  document.getElementById('calGrid').innerHTML=html;
  document.getElementById('calDetail').style.display='none';
}

function showCalDetail(fbKey) {
  const m=meetings.find(x=>x.fbKey===fbKey);
  if (!m) return;
  const el=document.getElementById('calDetail');
  el.style.display='block';
  el.innerHTML=renderMeetingCard(m,true);
}
window.showCalDetail=showCalDetail;

// ── PEOPLE ──
function renderPeople() {
  const main=document.getElementById('peopleMain');
  const detail=document.getElementById('personDetail');
  if (main) main.style.display='block';
  if (detail) detail.style.display='none';
  const grid=document.getElementById('peopleGrid');
  if (!grid) return;
  grid.innerHTML=people.map(p=>{
    const myM=meetings.filter(m=>(m.personFbKeys||[]).includes(p.fbKey));
    return `<div class="person-card" onclick="openPersonDetail('${p.fbKey}')">
      <button class="person-del-btn" onclick="event.stopPropagation();delPerson('${p.fbKey}')">×</button>
      <div class="person-name-big">${p.name}</div>
      <div class="person-group">${p.group||'—'}</div>
      <div class="person-stats">
        <div class="person-stat"><strong>${myM.length}</strong>회</div>
      </div>
    </div>`;
  }).join('') || '<div class="empty">등록된 인원이 없습니다</div>';
}

function openPersonDetail(fbKey) {
  const p=people.find(x=>x.fbKey===fbKey);
  if (!p) return;
  const myM=meetings.filter(m=>(m.personFbKeys||[]).includes(fbKey)).sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById('pd-name').textContent=p.name;
  document.getElementById('pd-group').textContent=p.group||'';
  document.getElementById('pd-count').textContent=myM.length;
  document.getElementById('pd-meetings').innerHTML=myM.map(m=>renderMeetingCard(m,true)).join('')||'<div class="empty">모임 기록이 없습니다</div>';
  document.getElementById('peopleMain').style.display='none';
  document.getElementById('personDetail').style.display='block';
}
window.openPersonDetail=openPersonDetail;
function closePersonDetail() {
  document.getElementById('peopleMain').style.display='block';
  document.getElementById('personDetail').style.display='none';
}
window.closePersonDetail=closePersonDetail;

function addPerson() {
  const name=document.getElementById('p-name').value.trim();
  const group=document.getElementById('p-group').value.trim();
  if (!name) { toast('이름을 입력해주세요'); return; }
  fbAddPerson({name,group});
  document.getElementById('p-name').value='';
  document.getElementById('p-group').value='';
  toast('✓ 추가되었습니다');
}
window.addPerson=addPerson;

function delPerson(fbKey) {
  if (!confirm('삭제하시겠습니까?')) return;
  fbRemovePerson(fbKey);
  toast('삭제되었습니다');
}
window.delPerson=delPerson;

// ── ADD MEETING ──
function addMeeting() {
  const date=document.getElementById('f-date').value;
  if (!formWho) { toast('민주/은선을 선택해주세요'); return; }
  if (!date) { toast('날짜를 입력해주세요'); return; }
  if (!curYN) { toast('양쪽 참석 여부를 선택해주세요'); return; }
  const personFbKeys=selectedFbKeys['f'];
  const extraPeople=document.getElementById('f-extra')?.value.trim()||'';
  const payments=getPayItems('f-payItems','pi');
  fbAddMeeting({who:formWho, date, yn:curYN, personFbKeys, extraPeople, payments});
  // 초기화
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  if (document.getElementById('f-extra')) document.getElementById('f-extra').value='';
  document.getElementById('f-payItems').innerHTML='';
  curYN=''; formWho='';
  document.getElementById('btn-o').className='yn-btn';
  document.getElementById('btn-x').className='yn-btn';
  document.getElementById('f-btn-mj').className='who-select-btn';
  document.getElementById('f-btn-es').className='who-select-btn';
  resetSearch('f');
  const listBtn=document.querySelector('.nav-btn:nth-child(2)');
  showTab('list',listBtn);
  toast('✓ 추가되었습니다');
}
window.addMeeting=addMeeting;

function delMeeting(fbKey) {
  if (!confirm('삭제하시겠습니까?')) return;
  fbRemoveMeeting(fbKey);
  toast('삭제되었습니다');
}
window.delMeeting=delMeeting;

// ── EDIT MODAL ──
function openEdit(fbKey) {
  const m=meetings.find(x=>x.fbKey===fbKey);
  if (!m) return;
  document.getElementById('m-fbkey').value=fbKey;
  document.getElementById('m-date').value=m.date||'';
  const mExtra = document.getElementById('m-extra');
  if (mExtra) mExtra.value=m.extraPeople||'';
  modalWho=m.who||''; setModalWho(modalWho);
  modalYN=m.yn||''; setModalYN(modalYN);
  // 기존 선택 복원
  selectedFbKeys['m'] = m.personFbKeys||[];
  renderSelectedTags('m');
  document.getElementById('m-search').value='';
  document.getElementById('m-dropdown').classList.remove('open');
  document.getElementById('m-payItems').innerHTML='';
  (m.payments||[]).forEach(p=>addPayItem('m-payItems','mpi',p.place,p.amount,p.memo));
  if (!(m.payments||[]).length) addPayItem('m-payItems','mpi');
  document.getElementById('editModal').classList.add('open');
}
window.openEdit=openEdit;
function closeModal() { document.getElementById('editModal').classList.remove('open'); }
window.closeModal=closeModal;
function saveEdit() {
  const fbKey=document.getElementById('m-fbkey').value;
  fbUpdateMeeting(fbKey,{
    who:modalWho,
    date:document.getElementById('m-date').value,
    yn:modalYN,
    personFbKeys:selectedFbKeys['m'],
    extraPeople:document.getElementById('m-extra')?.value.trim()||'',
    payments:getPayItems('m-payItems','mpi'),
  });
  closeModal();
  toast('✓ 수정되었습니다');
}
window.saveEdit=saveEdit;
document.getElementById('editModal').addEventListener('click',function(e){if(e.target===this)window.closeModal();});

document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
</script>
